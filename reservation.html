<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réservation</title>
<style>
body{background:black;color:white;font-family:Montserrat;}
input,select{width:90%;padding:10px;margin:10px;}
.btn{background:gold;padding:12px;border:none;font-weight:bold;cursor:pointer;}
</style>
</head>

<body>

<h1 style="color:gold;text-align:center;">Réservation VIP</h1>

<div style="text-align:center;">
<input id="name" placeholder="Nom">
<input id="phone" placeholder="WhatsApp">
<input id="from" placeholder="Départ">
<input id="to" placeholder="Destination">

<select id="service">
<option>VTC Chauffeur</option>
<option>Aéroport VIP</option>
<option>Mariage</option>
<option>Business</option>
<option>Location</option>
<option>Vente véhicule</option>
</select>

<button class="btn" onclick="send()">Envoyer WhatsApp</button>
</div>

<script>
function send(){
let msg="Nom:"+name.value+" Départ:"+from.value+" Destination:"+to.value+" Service:"+service.value;
window.open("https://wa.me/221770953766?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
